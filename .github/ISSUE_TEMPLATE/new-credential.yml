name: New default credential
description: Suggest a public default credential record.
title: "Add credential: "
labels: ["data"]
body:
  - type: input
    id: product
    attributes:
      label: Product
      description: Product, appliance, package, or service name.
    validations:
      required: true
  - type: input
    id: vendor
    attributes:
      label: Vendor or project
    validations:
      required: true
  - type: textarea
    id: credential
    attributes:
      label: Credential
      description: Username, password, version range, service, port, protocol, login path, and context.
    validations:
      required: true
  - type: textarea
    id: sources
    attributes:
      label: Public sources
      description: Link vendor docs, manuals, sample configs, public lists, or lab references.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: This is a public default, vendor, sample, appliance, or lab credential, not a leaked or environment-specific secret.
          required: true
